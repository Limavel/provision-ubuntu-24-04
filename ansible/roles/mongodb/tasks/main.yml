---
- name: Add MongoDB GPG key
  shell: |
    curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
  args:
    creates: /usr/share/keyrings/mongodb-server-7.0.gpg

- name: Check if MongoDB repo supports this distribution release
  uri:
    url: "http://repo.mongodb.org/apt/ubuntu/dists/{{ ansible_distribution_release }}/mongodb-org/7.0/Release"
    method: HEAD
  register: mongodb_repo_check
  ignore_errors: yes

- name: Set MongoDB repo distribution codename
  set_fact:
    mongodb_repo_dist: "{{ ansible_distribution_release if mongodb_repo_check is success else 'jammy' }}"

- name: Add MongoDB repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg] http://repo.mongodb.org/apt/ubuntu {{ mongodb_repo_dist }}/mongodb-org/7.0 multiverse"
    state: present
    filename: mongodb-org-7.0

- name: Update apt cache after adding MongoDB repo
  apt:
    update_cache: yes

- name: Install MongoDB
  apt:
    name: mongodb-org
    state: present

- name: Enable and start MongoDB
  systemd:
    name: mongod
    state: started
    enabled: yes
